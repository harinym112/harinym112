<svg width="100%" viewBox="0 0 900 180" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Hariny M — AI &amp; Data Science | Cybersecurity | Full-Stack Developer</title>
<desc>Profile banner for Hariny M, B.Tech AI &amp; Data Science graduate with Cybersecurity Honors</desc>
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#0d1117"/>
    <stop offset="50%" style="stop-color:#161b27"/>
    <stop offset="100%" style="stop-color:#0d1117"/>
  </linearGradient>
  <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#0d1117;stop-opacity:0"/>
    <stop offset="30%" style="stop-color:#58a6ff;stop-opacity:0.8"/>
    <stop offset="70%" style="stop-color:#58a6ff;stop-opacity:0.8"/>
    <stop offset="100%" style="stop-color:#0d1117;stop-opacity:0"/>
  </linearGradient>
</defs>

<rect width="900" height="180" fill="url(#bg)" rx="0"/>

<!-- subtle grid dots -->
<g opacity="0.07" fill="#58a6ff">
  <circle cx="60" cy="40" r="1.5"/><circle cx="120" cy="40" r="1.5"/><circle cx="180" cy="40" r="1.5"/><circle cx="240" cy="40" r="1.5"/><circle cx="300" cy="40" r="1.5"/><circle cx="360" cy="40" r="1.5"/><circle cx="420" cy="40" r="1.5"/><circle cx="480" cy="40" r="1.5"/><circle cx="540" cy="40" r="1.5"/><circle cx="600" cy="40" r="1.5"/><circle cx="660" cy="40" r="1.5"/><circle cx="720" cy="40" r="1.5"/><circle cx="780" cy="40" r="1.5"/><circle cx="840" cy="40" r="1.5"/>
  <circle cx="60" cy="90" r="1.5"/><circle cx="120" cy="90" r="1.5"/><circle cx="180" cy="90" r="1.5"/><circle cx="240" cy="90" r="1.5"/><circle cx="300" cy="90" r="1.5"/><circle cx="360" cy="90" r="1.5"/><circle cx="420" cy="90" r="1.5"/><circle cx="480" cy="90" r="1.5"/><circle cx="540" cy="90" r="1.5"/><circle cx="600" cy="90" r="1.5"/><circle cx="660" cy="90" r="1.5"/><circle cx="720" cy="90" r="1.5"/><circle cx="780" cy="90" r="1.5"/><circle cx="840" cy="90" r="1.5"/>
  <circle cx="60" cy="140" r="1.5"/><circle cx="120" cy="140" r="1.5"/><circle cx="180" cy="140" r="1.5"/><circle cx="240" cy="140" r="1.5"/><circle cx="300" cy="140" r="1.5"/><circle cx="360" cy="140" r="1.5"/><circle cx="420" cy="140" r="1.5"/><circle cx="480" cy="140" r="1.5"/><circle cx="540" cy="140" r="1.5"/><circle cx="600" cy="140" r="1.5"/><circle cx="660" cy="140" r="1.5"/><circle cx="720" cy="140" r="1.5"/><circle cx="780" cy="140" r="1.5"/><circle cx="840" cy="140" r="1.5"/>
</g>

<!-- corner accent circles -->
<circle cx="0" cy="0" r="80" fill="none" stroke="#58a6ff" stroke-width="0.5" opacity="0.15"/>
<circle cx="0" cy="0" r="130" fill="none" stroke="#58a6ff" stroke-width="0.5" opacity="0.08"/>
<circle cx="900" cy="180" r="80" fill="none" stroke="#58a6ff" stroke-width="0.5" opacity="0.15"/>
<circle cx="900" cy="180" r="130" fill="none" stroke="#58a6ff" stroke-width="0.5" opacity="0.08"/>

<!-- name -->
<text x="450" y="72" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="46" font-weight="700" letter-spacing="4" fill="#58a6ff">HARINY M</text>

<!-- divider line -->
<rect x="175" y="86" width="550" height="1" fill="url(#line)"/>

<!-- subtitle -->
<text x="450" y="114" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="3" fill="#8b949e">AI &amp; DATA SCIENCE  ·  CYBERSECURITY  ·  FULL-STACK DEVELOPER</text>

<!-- bottom tag -->
<text x="450" y="148" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="400" letter-spacing="1" fill="#3d6a9e">Mepco Schlenk Engineering College · Class of 2026</text>

<!-- small blue accent dots flanking name -->
<circle cx="195" cy="68" r="3" fill="#58a6ff" opacity="0.5"/>
<circle cx="705" cy="68" r="3" fill="#58a6ff" opacity="0.5"/>
</svg>
